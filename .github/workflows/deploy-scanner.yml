name: Deploy scanner to scanner-vm

on:
  push:
    branches: [main]
    paths:
      - 'scanner/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/appvault-scanner

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./scanner
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/appvault-scanner:latest

      - name: Deploy to scanner-vm
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SCANNER_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/scanner
            echo ${{ secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull scanner
            docker compose up -d --no-deps scanner
            docker compose ps